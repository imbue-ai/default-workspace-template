# Betterleaks config for scan_secrets.sh (the publish-inspiration secret
# scan). Betterleaks is one of the three scanners the scan runs; this config
# applies only to it (trufflehog and kingfisher have no filename-based rules
# and run with their own flags).
#
# Scope: the scan runs `betterleaks dir` over the STAGING directory, which
# holds exactly the files overlaid out of the live mind (the selected
# --include / --data-include paths plus carried-forward inspiration-*.md/.svg).
# The clean template base is trusted, public, and never scanned -- its own
# test fixtures legitimately contain placeholder token strings.
#
# Format notes: betterleaks accepts gitleaks-shaped TOML ([extend], [[rules]]
# with `path`/`regex`/`keywords`), but it does NOT honor gitleaks'
# [[rules.allowlists]] tables -- false-positive exemptions are written as
# Expr `prefilter`/`filter` expressions instead (and rule-level `filter` only
# runs for regex matches, not for path-only findings, which is why the .env
# template exemption below is a global prefilter). Regexes still compile with
# RE2 -- no lookaheads.

# The .env template exemption: .env.example / .env.sample / .env.template are
# deliberately non-secret placeholder templates and are allowed to ship, so
# skip those files before any rule runs (this also skips betterleaks' content
# rules for them; the other two scanners in scan_secrets.sh still content-scan
# every file, so a real credential pasted into a template file is still
# caught).
prefilter = '''
filter.matchesAny(get(attributes, "path", ""), [
  `(^|/)\.env\.(example|sample|template)$`,
])
'''

# Extend betterleaks' default ruleset (GitHub PATs, AWS keys, private-key
# headers, and hundreds of provider-specific value rules) rather than
# replacing it. Everything below is ADDED on top of those defaults.
[extend]
useDefault = true

# --- credential FILENAMES ----------------------------------------------------
# The default ruleset matches secret VALUES inside files; these path-only
# rules replicate the historical credential-filename blocklist so a
# credential-bearing file is blocked by NAME even when its contents evade
# every value pattern.

[[rules]]
id = "minds-env-file"
description = "Env file present (.env / .env.*) -- these carry real credentials"
path = '''(^|/)\.env(\.[^/]+)?$'''

[[rules]]
id = "minds-credential-file"
description = "Well-known credential-store filename present (git/gh/pypi/claude/session credentials)"
path = '''(^|/)(\.netrc|\.git-credentials|\.claude\.json|\.pypirc|\.sesskey)$'''

[[rules]]
id = "minds-gh-hosts-file"
description = "gh CLI hosts.yml present -- it stores OAuth tokens (matched by path suffix, not basename)"
path = '''(^|/)\.config/gh/hosts\.yml$'''

# --- broader Anthropic key rule ----------------------------------------------
# The default ruleset's Anthropic rule only matches the strict
# `sk-ant-api03-...` shape; real Anthropic tokens come in other `sk-ant-*`
# shapes (admin keys, OAuth tokens), so match any sk-ant- prefix followed by a
# plausibly-secret body. Requiring 24+ body characters keeps short
# placeholders like `sk-ant-test` from firing (real keys are ~90+ chars).
# The filter drops long documentation placeholders that would otherwise
# satisfy the 24+ char body (matched case-insensitively against the secret).
[[rules]]
id = "minds-anthropic-key-broad"
description = "Anthropic sk-ant-* API key/token of any shape"
regex = '''sk-ant-[A-Za-z0-9_-]{24,}'''
keywords = ["sk-ant-"]
filter = '''
filter.containsAny(lower(finding["secret"]), [
  "example",
  "placeholder",
  "redacted",
  "xxxxxxxx",
])
'''
